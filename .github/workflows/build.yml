name: Build CopyPaster

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # Every push to main is a release: bump the patch version, commit, tag.
  version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
      skipped: ${{ steps.bump.outputs.skipped }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 2

      - name: Auto-bump version
        id: bump
        run: |
          CURRENT=$(python3 -c "import json; print(json.load(open('src-tauri/tauri.conf.json'))['version'])")
          echo "Current version: $CURRENT"

          # The bump commit is itself a push to main. Without these two guards it
          # would trigger this workflow again, forever.
          if git describe --exact-match HEAD 2>/dev/null; then
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            echo "Commit already tagged, skipping"
            exit 0
          fi
          LAST_MSG=$(git log -1 --pretty=%s)
          if [[ "$LAST_MSG" == v* ]] || [[ "$LAST_MSG" == *"auto-bump"* ]]; then
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            echo "Last commit was a version bump, skipping"
            exit 0
          fi

          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          PATCH=$((PATCH + 1))
          NEW="$MAJOR.$MINOR.$PATCH"
          TAG="v$NEW"
          echo "Bumping to: $NEW"

          python3 -c "
          import json
          f = 'src-tauri/tauri.conf.json'
          d = json.load(open(f))
          d['version'] = '$NEW'
          json.dump(d, open(f, 'w'), indent=2)
          "
          sed -i "s/^version = \"$CURRENT\"/version = \"$NEW\"/" src-tauri/Cargo.toml

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "$TAG auto-bump"
          git tag "$TAG"
          git push origin main "$TAG"

          echo "version=$NEW" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "skipped=false" >> "$GITHUB_OUTPUT"

  test:
    needs: version
    if: needs.version.outputs.skipped != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.version.outputs.tag }}
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
      - run: npm install
      - name: JS unit tests (search, filtering, highlighting)
        run: npm test

  build-windows:
    needs: [version, test]
    if: needs.version.outputs.skipped != 'true'
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.version.outputs.tag }}
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
      - uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri
      - run: npm install

      - name: Rust unit tests
        working-directory: src-tauri
        shell: bash
        # Absolute path: the runner has a `cargo` shim earlier in PATH.
        run: "$HOME/.cargo/bin/cargo test --lib"

      - name: Build Tauri app
        id: build
        continue-on-error: true
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          args: --target x86_64-pc-windows-msvc --bundles nsis
          tagName: ${{ needs.version.outputs.tag }}
          releaseName: CopyPaster ${{ needs.version.outputs.tag }}
          releaseBody: "See the assets below to download and install."
          releaseDraft: false
          prerelease: false

      # The build is reliable; the upload occasionally dies on a transient GitHub
      # API timeout. There is no native retry for a `uses:` step, so repeat it
      # once — the rebuild comes off the warm Rust cache.
      - name: Build Tauri app (retry)
        if: steps.build.outcome == 'failure'
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        with:
          args: --target x86_64-pc-windows-msvc --bundles nsis
          tagName: ${{ needs.version.outputs.tag }}
          releaseName: CopyPaster ${{ needs.version.outputs.tag }}
          releaseBody: "See the assets below to download and install."
          releaseDraft: false
          prerelease: false

      # Re-upload the installer under a stable, version-less name so the README
      # download button can link straight at the file
      # (releases/latest/download/<name>). Tauri's own asset names carry the
      # version, so any direct link to them dies on the next bump — which is why
      # the buttons used to dump the user on the releases page instead.
      - name: Publish stable-named Windows installer
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.version.outputs.tag }}
        run: |
          exe=$(ls src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*-setup.exe | head -1)
          cp "$exe" CopyPaster_Windows_Setup.exe
          gh release upload "$TAG" CopyPaster_Windows_Setup.exe --clobber --repo "$GITHUB_REPOSITORY"

  build-macos:
    # Runs AFTER build-windows, not beside it: tauri-action publishes latest.json
    # by read-modify-writing the same release asset, and two jobs uploading at
    # once race on a stale read and silently drop platform keys — which is how
    # Ribbit once stranded every Apple-Silicon user on "update failed".
    needs: [version, test, build-windows]
    if: needs.version.outputs.skipped != 'true'
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.version.outputs.tag }}
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin
      - uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: src-tauri
      - run: npm install

      - name: Rust unit tests
        working-directory: src-tauri
        shell: bash
        run: "$HOME/.cargo/bin/cargo test --lib"

      # CopyPaster pastes by posting a synthetic Cmd+V, which macOS only allows
      # with an Accessibility grant. That grant is anchored to the code signature:
      # an ad-hoc build gets a new identity on every release, so the user would
      # have to re-approve the app after each update. Signing with a *stable*
      # cert anchors the grant to the cert, and it survives.
      #
      # A self-signed cert only counts as a valid codesigning identity once its
      # root is trusted — until then `security find-identity -v -p codesigning`
      # omits it and the bundler dies with "failed to resolve signing identity".
      - name: Set up code-signing keychain (self-signed, trusted)
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: |
          set -euo pipefail
          KEYCHAIN="$RUNNER_TEMP/copypaster-signing.keychain-db"
          KEYCHAIN_PWD="$(openssl rand -base64 24)"
          P12="$RUNNER_TEMP/copypaster.p12"
          CERT="$RUNNER_TEMP/copypaster-cert.pem"

          printf '%s' "$APPLE_CERTIFICATE" | openssl base64 -d -A > "$P12"

          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          security import "$P12" -k "$KEYCHAIN" -P "$APPLE_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign -T /usr/bin/security
          # Let codesign reach the private key without an interactive prompt.
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PWD" "$KEYCHAIN" >/dev/null

          security list-keychains -d user -s "$KEYCHAIN" \
            $(security list-keychains -d user | tr -d '"')

          security find-certificate -c "$APPLE_SIGNING_IDENTITY" -p "$KEYCHAIN" > "$CERT"
          sudo security add-trusted-cert -d -r trustRoot -p codeSign \
            -k /Library/Keychains/System.keychain "$CERT"

          echo "Valid codesigning identities after trust:"
          security find-identity -v -p codesigning
          security find-identity -v -p codesigning | grep -q "$APPLE_SIGNING_IDENTITY" \
            || { echo "::error::signing identity '$APPLE_SIGNING_IDENTITY' did not resolve"; exit 1; }

      # Native per-arch builds, run in order inside this one job. A universal
      # (lipo'd) bundle does not anchor TCC grants reliably — Ribbit lost its
      # microphone that way — and the sequential order keeps two uploads from
      # touching latest.json at the same moment.
      - name: Build Tauri app (Apple Silicon)
        id: build_arm
        continue-on-error: true
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        with:
          args: --target aarch64-apple-darwin --bundles app,dmg
          tagName: ${{ needs.version.outputs.tag }}
          releaseName: CopyPaster ${{ needs.version.outputs.tag }}
          releaseBody: "See the assets below to download and install."
          releaseDraft: false
          prerelease: false

      - name: Build Tauri app (Apple Silicon, retry)
        if: steps.build_arm.outcome == 'failure'
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        with:
          args: --target aarch64-apple-darwin --bundles app,dmg
          tagName: ${{ needs.version.outputs.tag }}
          releaseName: CopyPaster ${{ needs.version.outputs.tag }}
          releaseBody: "See the assets below to download and install."
          releaseDraft: false
          prerelease: false

      - name: Build Tauri app (Intel)
        id: build_intel
        continue-on-error: true
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        with:
          args: --target x86_64-apple-darwin --bundles app,dmg
          tagName: ${{ needs.version.outputs.tag }}
          releaseName: CopyPaster ${{ needs.version.outputs.tag }}
          releaseBody: "See the assets below to download and install."
          releaseDraft: false
          prerelease: false

      - name: Build Tauri app (Intel, retry)
        if: steps.build_intel.outcome == 'failure'
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        with:
          args: --target x86_64-apple-darwin --bundles app,dmg
          tagName: ${{ needs.version.outputs.tag }}
          releaseName: CopyPaster ${{ needs.version.outputs.tag }}
          releaseBody: "See the assets below to download and install."
          releaseDraft: false
          prerelease: false

      # Stable, version-less copies for the README download buttons (both Macs).
      # Direct links: releases/latest/download/CopyPaster_macOS_*.dmg.
      - name: Publish stable-named macOS installers
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.version.outputs.tag }}
        run: |
          arm=$(ls src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg | head -1)
          intel=$(ls src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg | head -1)
          cp "$arm" CopyPaster_macOS_AppleSilicon.dmg
          cp "$intel" CopyPaster_macOS_Intel.dmg
          gh release upload "$TAG" CopyPaster_macOS_AppleSilicon.dmg CopyPaster_macOS_Intel.dmg --clobber --repo "$GITHUB_REPOSITORY"

      # The in-app updater is only as good as latest.json. Fail loudly here rather
      # than ship a manifest that silently strands one platform on an old version.
      - name: Verify updater manifest
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.version.outputs.tag }}
        run: |
          gh release download "$TAG" -R "$GITHUB_REPOSITORY" -p latest.json --clobber
          python3 - "$TAG" <<'PY'
          import json, sys
          tag = sys.argv[1]
          want = {"windows-x86_64", "darwin-aarch64", "darwin-x86_64"}
          m = json.load(open("latest.json"))
          plats = m.get("platforms", {})
          missing = want - set(plats)
          if missing:
              print(f"::error::latest.json missing platform keys: {sorted(missing)}")
              sys.exit(1)
          if f"v{m.get('version')}" != tag:
              print(f"::error::latest.json version {m.get('version')!r} != tag {tag!r}")
              sys.exit(1)
          for key in ("darwin-aarch64", "darwin-x86_64"):
              if "universal" in plats[key].get("url", "").lower():
                  print(f"::error::{key} points at a universal bundle; macOS must ship per-arch")
                  sys.exit(1)
          print(f"latest.json OK: v{m['version']}, platforms {sorted(plats)}")
          PY
