<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Settings</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="sheet">
    <div class="zone">
      <h2>Keep the history for</h2>
      <p class="hint">Clips older than this are deleted. Fifty cards is the most the list holds either way.</p>
      <div class="choices" id="retention"></div>
    </div>

    <div class="zone">
      <h2>Screenshots</h2>
      <label class="switch-row">
        <input type="checkbox" id="instant" />
        <span class="switch-text">
          Straight to the clipboard
          <small>No floating thumbnail — the capture is copyable at once, not five seconds later.</small>
        </span>
      </label>
    </div>

    <div class="zone">
      <h2>Interface size</h2>
      <p class="hint">How large the popup and these windows are drawn. The popup picks it up the next time you summon it.</p>
      <div class="scale-row">
        <input type="range" id="ui-scale" aria-label="Interface size" />
        <span class="scale-value" id="scale-value">110%</span>
      </div>
      <p class="scale-sample" id="scale-sample">The quick brown fox</p>
    </div>

    <p class="hint" id="status"></p>

    <script type="module" src="settings.js"></script>
  </body>
</html>
